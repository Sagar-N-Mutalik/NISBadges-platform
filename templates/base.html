<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NISBadges Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; }
        .sidebar { width: 250px; background-color: #212529; min-height: 100vh; padding-top: 20px; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background-color: #343a40; }
        .sidebar .submenu a { padding-left: 40px; font-size: 0.9em; }
        .content-area { flex-grow: 1; padding: 30px; }
    </style>
</head>
<body class="d-flex flex-row">

    <div class="sidebar shadow-sm">
        <h4 class="text-center text-white fw-bold mb-4">NISBadges</h4>
        
        <a href="#" class="{% if request.resolver_match.url_name == 'dashboard_home' %}active{% endif %}">
            <i class="bi bi-house-door me-2"></i> Dashboard
        </a>
        
        <a href="{% url 'upload_members' %}" class="{% if request.resolver_match.url_name == 'upload_members' %}active{% endif %}">
            <i class="bi bi-people me-2"></i> Members Database
        </a>

        <div class="pt-2 pb-1 px-3 text-uppercase text-muted" style="font-size: 0.8em; font-weight: bold;">Events</div>
        <div class="submenu">
            <a href="#"><i class="bi bi-plus-circle me-2"></i> Create Event</a>
            <a href="#"><i class="bi bi-calendar-event me-2"></i> Event List</a>
            <a href="{% url 'upload_attendance' %}" class="{% if request.resolver_match.url_name == 'upload_attendance' %}active{% endif %}">
                <i class="bi bi-file-earmark-spreadsheet me-2"></i> Attendance Upload
            </a>
        </div>

        <div class="pt-3 pb-1 px-3 text-uppercase text-muted" style="font-size: 0.8em; font-weight: bold;">Processing & Ranks</div>
        <a href="{% url 'process_referrals' %}" class="{% if request.resolver_match.url_name == 'process_referrals' %}active{% endif %}">
            <i class="bi bi-person-plus me-2"></i> Referral Processing
        </a>
        <a href="{% url 'view_leaderboard' %}" class="{% if request.resolver_match.url_name == 'view_leaderboard' %}active{% endif %}">
            <i class="bi bi-trophy me-2"></i> Leaderboard
        </a>
        <a href="{% url 'badge_eligibility' %}" class="{% if request.resolver_match.url_name == 'badge_eligibility' %}active{% endif %}">
            <i class="bi bi-award me-2"></i> Badge Eligibility
        </a>

        <div class="pt-3 pb-1 px-3 text-uppercase text-muted" style="font-size: 0.8em; font-weight: bold;">System</div>
        <a href="/admin/">
            <i class="bi bi-gear me-2"></i> Admin Settings
        </a>
    </div>

    <div class="content-area">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
